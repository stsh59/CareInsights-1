<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../static/js/tailwind.js"></script>
    <title>Dashboard</title>
</head>

<body>
    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <p class="text-white heading">CareInsights</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">Dashboard</a>
                <a href="#" class="nav-item">Administration</a>
                <a href="#" class="nav-item">Clinical</a>
                <a href="#" class="nav-item">Diagnostics</a>
                <!-- Additional Sidebar links -->
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex flex-1 flex-col overflow-y-auto overflow-x-hidden main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <p class="title">Dashboard</p>
                </div>
                <div class="header-right">
                    <div id="userDropdown" class="user-dropdown">
                        <span id="userName" class="user-name">
                            Hello, {{ current_user.username }}!
                        </span>
                        <div id="dropdownMenu" class="dropdown-menu">
                            <a href="{{ url_for('auth.logout') }}" class="logout-button">Log Out</a>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Area -->
            <main class="main">
                <div class="mx-auto max-w-screen-2xl p-2 md:p-6">
                    <!-- Main Content Area -->
                    <div id="content"></div>

                    <div class="grid grid-cols-12 gap-4 md:gap-6 2xl:gap-7.5" id="charts">

                    </div>

                    <div id="loading" class="m-16 h-16 w-16 animate-spin hidden"></div>
                </div>
            </main>
        </div>
    </div>
    <script src="../static/js/dashboard.js"></script>
</body>

</html>
